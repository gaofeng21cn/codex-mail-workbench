version: 1
accounts:
  - account_id: work
    email: work@example.com
    imap:
      host: imap.example.com
      port: 993
      security: ssl
      username: work@example.com
      secret_ref: mail.work.imap.password
    smtp:
      host: smtp.example.com
      port: 465
      security: ssl
      username: work@example.com
      secret_ref: mail.work.smtp.password
    folders:
      include: ["*"]
      exclude: ["Archive"]

  - account_id: personal
    email: personal@example.test
    imap:
      host: imap.example.test
      port: 993
      security: ssl
      username: personal@example.test
      secret_ref: mail.personal.imap.password
    smtp:
      host: smtp.example.test
      port: 465
      security: ssl
      username: personal@example.test
      secret_ref: mail.personal.smtp.password
    folders:
      include: ["INBOX"]
      exclude: []

