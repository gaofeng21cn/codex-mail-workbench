version: 1
accounts:
  - account_id: work
    email: work@example.com
    imap:
      host: imap.example.com
      port: 993
      security: ssl
      username: work@example.com
      credential_ref: keychain.work.imap
    smtp:
      host: smtp.example.com
      port: 465
      security: ssl
      username: work@example.com
      credential_ref: keychain.work.smtp
    folders:
      include: ["*"]
      exclude: ["Archive"]

  - account_id: personal
    email: personal@example.test
    imap:
      host: imap.example.test
      port: 993
      security: ssl
      username: personal@example.test
      credential_ref: keychain.personal.imap
    smtp:
      host: smtp.example.test
      port: 465
      security: ssl
      username: personal@example.test
      credential_ref: keychain.personal.smtp
    folders:
      include: ["INBOX"]
      exclude: []
